<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MSFISH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">  
  </head>
  

<body>
    <meta charset="utf8" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"
        integrity="sha512-n7swEtVCvXpQ7KxgpPyp0+DQQEf5vPpmzCRl14x2sp2v5LpCYCjrAx03mkBAbWwGF9eUoIk8YVcDFuJRIeYttg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script>
        window.addEventListener('load', async function () {
            const sqlPromise = initSqlJs({
                locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
            });
            const dataPromise = fetch("./msfish.db").then(res => res.arrayBuffer());
            const [SQL, buf] = await Promise.all([sqlPromise, dataPromise])
            window.db = new SQL.Database(new Uint8Array(buf));
            window.listp();
            window.showcharts(window.results[0][1])
        });
        window.showcharts = (id) => {
            var chartdata = [];
            var chartdata2 = [];

            // alert: printf detected in an html page :explosion:

            var sql = `select date, kills,  printf("%.4f", kills * 1.0 / deaths * 1.0) as kd, name from snapshots where pid="${id}"`;
            var result = '', error = '';
            try { result = window.db.exec(sql); }
            catch (e) { error = e; }
            
            result[0]['values'].forEach(element => {
                chartdata.push([parseInt(element[0]), parseInt(element[1])]);
                chartdata2.push([parseInt(element[0]), parseFloat(element[2])]);
            });

            const chartoptions = Highcharts.setOptions({
                time: {
                    timezone: 'America/Edmonton'
                }
            });
            const chart = Highcharts.chart('killschart', {
                chart: {
                    type: 'line',
                    height: `${window.innerHeight}px`
                },
                title: {
                    text: result[0]['values'][0][3]
                },
                xAxis: {
                    type: 'datetime',
                    labels: {
                        formatter: function () {
                            var dd = new Date(this.value);
                            return dd.toLocaleDateString();
                        }
                    },
                },
                yAxis: [{
                    title: {
                        text: 'kills'
                    }
                }, {
                    title: {
                        text: 'kd'
                    }, opposite: true
                }],

                series: [{
                    yAxis: 0,
                    name: 'kills',
                    data: chartdata
                }, {
                    yAxis: 1,
                    name: 'kd',
                    data: chartdata2
                }
                ],

                plotOptions: {
                    series: {
                        label: {
                            connectorAllowed: false
                        }
                    }
                }
            });
        }

        window.formatTime = (diff) => {

diff/=1000
  var interval = Math.floor(diff / 31536000);

  if (interval >= 1) {
    return interval + "y";
  }
  interval = Math.floor(diff / 2592000);
  if (interval >= 1) {
    return interval + "m";
  }
  interval = Math.floor(diff / 604800);
  if (interval >= 1) {
    return interval + "w";
  }
  interval = Math.floor(diff / 86400);
  if (interval >= 1) {
    return interval + "d";
  }
  interval = Math.floor(diff / 3600);
  if (interval >= 1) {
    return interval + "h";
  }
  interval = Math.floor(diff / 60);
  if (interval >= 1) {
    return interval + " m";
  }
  return "<1m";
}

        window.listp = () => {
            var innerhtml = '<div class="list-group ">'
            var ele = document.getElementById('playerlist');         
            var sql = `
            SELECT name, pid,            
STRFTIME('%s','now') * 1000 - MIN(date) AS miliago,
STRFTIME('%s','now') * 1000 - MAX(date) AS lsmiliago
FROM (
SELECT * FROM (
SELECT pid, MAX(date) AS recentdate, name, kills
FROM snapshots GROUP BY pid) AS a
JOIN snapshots AS b ON
a.pid = b.pid AND a.kills = b.kills)  
GROUP BY pid ORDER BY miliago
`;       
            var result = '', error = '';
            try { result = window.db.exec(sql); }          
            catch (e) { error = e; }
            window.results = result[0]['values']        
            result[0]['values'].forEach(element => {
                innerhtml +=
                 `<div style="width: 13em; display:inline " 
                 class="list-group-item py-1" 
                 onclick=window.showcharts('${element[1]}')>

                    <div class="name">  ${element[0]}  </div>
                   
                    <div style="font-size: .7rem;">
                        🎮
                        ${window.formatTime(element[2])}
                        📸
                        ${window.formatTime(element[3])}

                    </div>
                </div>
                `
            });
            innerhtml += '</div>'
            ele.innerHTML = innerhtml;
        }
    </script>
<div class="container">
    <div class="row">
      <div class="col-3">
        <div id="playerlist" ></div>
      </div>
      <div class="col-9">
        <div id="killschart" style = "height:auto"></div>
      </div>
    </div>
      </div>
    <div class="sqlrepl" style="display: none;">
        <textarea id="input" name="w3review" rows="4" cols="50">
            SELECT name FROM sqlite_schema WHERE type='table' ORDER BY name
            </textarea>
        <button id='submit'>Execute</button>
        <pre id='result'></pre>
        <pre id='error'></pre>
    </div>
    
    <script>
        document.getElementById('submit').onclick = function () {
            var sql = document.getElementById('input').value;
            var result = '', error = '';
            try { result = window.db.exec(sql); }
            catch (e) { error = e; }
            document.getElementById('result').innerHTML = JSON.stringify(result, null, '  ');
            document.getElementById('error').innerHTML = error;
        };
    </script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>
</body>
</html>
