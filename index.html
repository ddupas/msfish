<!DOCTYPE html>

<head>

</head>

<body>
    <h1>MSFISH</h1>
    <P>click player</P>
    <meta charset="utf8" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"
        integrity="sha512-n7swEtVCvXpQ7KxgpPyp0+DQQEf5vPpmzCRl14x2sp2v5LpCYCjrAx03mkBAbWwGF9eUoIk8YVcDFuJRIeYttg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script>
        window.addEventListener('load', async function () {
            const sqlPromise = initSqlJs({
                locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
            });
            const dataPromise = fetch("./msfish.db").then(res => res.arrayBuffer());
            const [SQL, buf] = await Promise.all([sqlPromise, dataPromise])
            window.db = new SQL.Database(new Uint8Array(buf));
            window.listp();
        });
        window.showcharts = (id) => {
            var chartdata = [];
            var chartdata2 = [];

            // alert: printf detected in an html page :explosion:

            var sql = `select date, kills,  printf("%.4f", kills * 1.0 / deaths * 1.0) as kd, name from snapshots where pid="${id}"`;
            var result = '', error = '';
            try { result = window.db.exec(sql); }
            catch (e) { error = e; }
            result[0]['values'].forEach(element => {
                chartdata.push([parseInt(element[0]), parseInt(element[1])]);
                chartdata2.push([parseInt(element[0]), parseFloat(element[2])]);
            });

            const chartoptions = Highcharts.setOptions({
                time: {
                    timezone: 'America/Edmonton'
                }
            });
            const chart = Highcharts.chart('killschart', {
                chart: {
                    type: 'line'
                },
                title: {
                    text: result[0]['values'][0][3]
                },
                xAxis: {
                    type: 'datetime',
                    labels: {
                        formatter: function () {
                            var dd = new Date(this.value);
                            return dd.toLocaleDateString();
                        }
                    },
                },
                yAxis: [{
                    title: {
                        text: 'kills'
                    }
                }, {
                    title: {
                        text: 'kd'
                    }, opposite: true
                }],

                series: [{
                    yAxis: 0,
                    name: 'kills',
                    data: chartdata
                }, {
                    yAxis: 1,
                    name: 'kd',
                    data: chartdata2
                }
                ],

                plotOptions: {
                    series: {
                        label: {
                            connectorAllowed: false
                        }
                    }
                }
            });
        }
        window.listp = () => {
            var ele = document.getElementById('playerlist');
            ele.innerHTML = '<ul>';
            var sql = "select name, id from players";
            var result = '', error = '';
            try { result = window.db.exec(sql); }
            catch (e) { error = e; }
            result[0]['values'].forEach(element => {
                ele.innerHTML += `<li onclick=window.showcharts('${element[1]}')>${element[0]}</li>`
            });
            ele.innerHTML += '</ul>'
        }
    </script>
    <div id="playerlist"></div>
    <div id="killschart" style="width:100%; height:400px;"></div>
    <div id="winschart"></div>
    <input type='text' id='input' placeholder="ENTER SOME SQL" size='50'
        value=" SELECT name FROM sqlite_schema WHERE type='table' ORDER BY name">
    <button id='submit'>Execute</button>
    <pre id='result'></pre>
    <pre id='error'></pre>
    <script>
        document.getElementById('submit').onclick = function () {
            var sql = document.getElementById('input').value;
            var result = '', error = '';
            try { result = window.db.exec(sql); }
            catch (e) { error = e; }
            document.getElementById('result').innerHTML = JSON.stringify(result, null, '  ');
            document.getElementById('error').innerHTML = error;
        };
    </script>
</body>
